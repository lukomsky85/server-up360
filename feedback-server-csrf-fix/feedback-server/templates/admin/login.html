<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход • Feedback Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            border: none;
            border-radius: 1rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        .login-card .card-body {
            padding: 2.5rem;
        }
        .form-label {
            font-weight: 500;
            font-size: 0.9rem;
        }
        .btn-primary {
            padding: 0.6rem 1.5rem;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="card login-card">
        <div class="card-body">
            <div class="text-center mb-4">
                <i class="bi bi-cloud-check fs-1 text-primary"></i>
                <h4 class="mt-3 mb-1">Feedback Admin</h4>
                <p class="text-muted small mb-0">Вход в панель управления</p>
            </div>
            
            <!-- Flash сообщения -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'danger' else 'success' }} alert-dismissible fade show py-2 small" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close btn-close-sm" data-bs-dismiss="alert"></button>
                    </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <form method="POST" action="{{ url_for('admin.login') }}">
                <!-- ✅ CSRF TOKEN (ОБЯЗАТЕЛЬНО для Flask-WTF) -->
                <!-- ✅ ВАЖНО: {{ csrf_token }} без скобок - это значение из контекст-процессора -->
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                
                <!-- Скрытое поле next для редиректа после входа -->
                <input type="hidden" name="next" value="{{ next or '' }}">
                
                <div class="mb-3">
                    <label for="username" class="form-label">Логин</label>
                    <input type="text" name="username" id="username" class="form-control form-control-lg" 
                           required autofocus autocomplete="username"
                           placeholder="admin">
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label">Пароль</label>
                    <input type="password" name="password" id="password" class="form-control form-control-lg" 
                           required autocomplete="current-password"
                           placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn btn-primary w-100 btn-lg">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Войти
                </button>
            </form>
            
            <div class="text-center mt-4">
                <small class="text-muted">
                    <i class="bi bi-shield-check me-1"></i>
                    Защищено CSRF-токеном
                </small>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
